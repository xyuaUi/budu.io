<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Budu.io - Physics Fun</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="pwa/manifest.json">
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-overlay">
        <div id="joystick-zone"></div>
        <div id="action-buttons">
            <button id="btn-jump" class="control-btn">JUMP</button>
            <button id="btn-punch" class="control-btn">PUNCH</button>
            <button id="btn-grab" class="control-btn">GRAB</button>
            <button id="btn-throw" class="control-btn">THROW</button>
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
