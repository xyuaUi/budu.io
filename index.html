<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <!--
    viewport-fit=cover  → konten meluas ke area notch/punch-hole
    Redmi 10 landscape punch-hole ada di kiri atas
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Budu.io</title>

  <!-- Android Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />

  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      /* Isi seluruh layar termasuk area notch */
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      width: 100vw;
      height: 100vh;

      /* Extend ke seluruh layar termasuk punch-hole kamera */
      min-height: -webkit-fill-available;
      background: #000;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
      position: fixed;
      inset: 0;

      /* Kunci layar ke landscape */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /*
      Patch khusus Redmi 10 landscape:
      Punch-hole kamera ada di sisi kiri ± 40px.
      Paksa background hitam meluas ke sana dengan
      margin negatif + padding kompensasi.
    */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      /* Tutup area punch-hole dan status bar */
      width: env(safe-area-inset-left, 48px);
      height: 100%;
      background: #000;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      right: 0;
      width: env(safe-area-inset-right, 0px);
      height: 100%;
      background: #000;
      z-index: 0;
    }

    #hola {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: 11px;
      font-family: sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <span id="hola">hola</span>

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js', { scope: '/budu.io/' });
    }

    // Install prompt
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    document.getElementById('hola').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
    });

    // Prevent scroll & bounce
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('contextmenu', (e) => e.preventDefault());
  </script>

</body>
</html>
