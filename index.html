<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <!-- ============================
       META ESSENTIALS
       ============================ -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- CRITICAL: Viewport with notch/punch-hole support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Budu.io</title>
  <meta name="description" content="Budu.io - Web Game" />

  <!-- ============================
       PWA META TAGS
       ============================ -->
  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <meta name="application-name" content="Budu.io" />

  <!-- iOS / Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budu.io" />

  <!-- Windows -->
  <meta name="msapplication-TileColor" content="#000000" />
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- ============================
       ORIENTATION LOCK (CSS hint)
       ============================ -->
  <meta name="screen-orientation" content="landscape" />
  <meta name="x5-orientation" content="landscape" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="x5-page-mode" content="app" />
  <!-- QQ Browser / Tencent X5 fullscreen support -->
  <meta name="browsermode" content="application" />

  <!-- ============================
       MANIFEST
       ============================ -->
  <link rel="manifest" href="manifest.json" />

  <!-- ============================
       ICONS
       ============================ -->
  <!-- Standard -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png" />

  <!-- ============================
       PERFORMANCE HINTS
       ============================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- ============================
       CSS
       ============================ -->
  <link rel="stylesheet" href="style.css" />

  <!-- ============================
       INLINE CRITICAL CSS
       (Prevents flash of unstyled content)
       ============================ -->
  <style>
    /* Instant black background — no flash */
    html, body {
      background: #000 !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* Landscape orientation via CSS */
    @media (orientation: portrait) {
      html {
        transform: rotate(90deg);
        transform-origin: left top;
        width: 100vh;
        height: 100vw;
        overflow-x: hidden;
        position: absolute;
        top: 100%;
        left: 0;
      }
    }
  </style>
</head>

<body>

  <!-- ============================
       LOADING SCREEN
       ============================ -->
  <div id="loading-screen">
    <div class="loading-logo">BUDU<span style="color:#fff">.</span>IO</div>
    <div class="loading-bar-wrapper">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Loading...</div>
  </div>

  <!-- ============================
       ORIENTATION WARNING
       (Shown only in portrait)
       ============================ -->
  <div id="orientation-warning">
    <div class="rotate-icon">🔄</div>
    <p>Putar perangkat ke mode <strong>Landscape</strong> untuk bermain</p>
  </div>

  <!-- ============================
       MAIN GAME WRAPPER
       ============================ -->
  <div id="game-wrapper">

    <!-- GAME CANVAS -->
    <canvas id="gameCanvas" class="gpu-layer"></canvas>

    <!-- HUD OVERLAY -->
    <div id="hud">
      <div class="hud-top">
        <div class="hud-score" id="scoreDisplay">SCORE: 0</div>
        <div class="hud-health">
          <div class="health-bar">
            <div class="health-fill" id="healthBar"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /game-wrapper -->

  <!-- ============================
       START / MAIN MENU SCREEN
       ============================ -->
  <div id="start-screen" class="hidden">
    <div class="game-title">BU<span>DU</span>.IO</div>
    <button class="btn-play" id="btnPlay">▶ MAIN</button>
  </div>

  <!-- ============================
       GAME OVER SCREEN
       ============================ -->
  <div id="gameover-screen">
    <div class="gameover-title">GAME OVER</div>
    <div class="final-score">Score: <strong id="finalScore">0</strong></div>
    <button class="btn-play" id="btnRestart">↺ RESTART</button>
  </div>

  <!-- ============================
       PWA INSTALL PROMPT BANNER
       ============================ -->
  <div id="install-prompt">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <strong>Install Budu.io</strong>
      <span>Pasang sebagai app di Android</span>
    </div>
    <button class="btn-install">Install</button>
    <button class="btn-dismiss">✕</button>
  </div>

  <!-- ============================
       SCRIPTS
       ============================ -->
  <script>
    // Inline: prevent any scroll/bounce before main.js loads
    document.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Prevent right-click
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  </script>

  <script src="main.js" defer></script>

</body>
</html>
